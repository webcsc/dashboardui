# =============================================================================
# CSC Dashboard — Docker Compose (Nginx Reverse Proxy)
# =============================================================================
#
# Usage:
#   DEV:   docker compose --profile dev up --build
#   PROD:  docker compose --profile prod up --build
#   BOTH:  docker compose --profile dev --profile prod up --build
#   DOWN:  docker compose --profile dev --profile prod down
#
# Pre-requisite (add to C:\Windows\System32\drivers\etc\hosts):
#   127.0.0.1  dashboard.chacunsoncafe.local
#   127.0.0.1  dashboard-dev.chacunsoncafe.local
#
# =============================================================================

services:
  # ─── Reverse Proxy (always active, no profile) ────────────────────────
  proxy:
    image: nginx:alpine
    container_name: csc-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      dashboard-dev:
        condition: service_started
        required: false
      dashboard-prod:
        condition: service_started
        required: false
    networks:
      - web

  # ─── DEV — Vite Dev Server with HMR ──────────────────────────────────
  dashboard-dev:
    container_name: csc-dashboard-dev
    profiles:
      - dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    restart: unless-stopped
    volumes:
      # Bind-mount source code for live editing
      - .:/app
      # Anonymous volume: keep container's node_modules isolated
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - .env
    networks:
      - web

  # ─── PROD — Nginx serving production build ───────────────────────────
  dashboard-prod:
    container_name: csc-dashboard-prod
    profiles:
      - prod
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
      secrets:
        - env_file
    restart: unless-stopped
    networks:
      - web

# ─── Shared Network ────────────────────────────────────────────────────
networks:
  web:
    name: web
    driver: bridge

# ─── Build Secrets ─────────────────────────────────────────────────────
secrets:
  env_file:
    file: .env
