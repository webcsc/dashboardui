# =============================================================================
# Nginx Reverse Proxy — Subdomain Routing (HTTP + HTTPS)
# =============================================================================
# Routes traffic by hostname:
#   dashboard-dev.chacunsoncafe.local  →  dashboard-dev:5173  (Vite HMR)
#   dashboard.chacunsoncafe.local      →  dashboard-prod:80   (nginx static)
#
# HTTPS via mkcert wildcard certificate (*.chacunsoncafe.local)
# HTTP automatically redirects to HTTPS
# =============================================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    server_name dashboard-dev.chacunsoncafe.local dashboard.chacunsoncafe.local;
    return 301 https://$host$request_uri;
}

# ─── DEV: Vite dev server (HTTPS) ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name dashboard-dev.chacunsoncafe.local;

    ssl_certificate     /etc/nginx/certs/_wildcard.chacunsoncafe.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.chacunsoncafe.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Resolve at request time (avoids crash if service is down)
    resolver 127.0.0.11 valid=10s;
    set $upstream_dev http://dashboard-dev:5173;

    location / {
        proxy_pass $upstream_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Vite HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── PROD: Nginx serving static build (HTTPS) ───────────────────────────
server {
    listen 443 ssl;
    server_name dashboard.chacunsoncafe.local;

    ssl_certificate     /etc/nginx/certs/_wildcard.chacunsoncafe.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.chacunsoncafe.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Resolve at request time
    resolver 127.0.0.11 valid=10s;
    set $upstream_prod http://dashboard-prod:80;

    location / {
        proxy_pass $upstream_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Fallback: catch-all ─────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/_wildcard.chacunsoncafe.local.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.chacunsoncafe.local-key.pem;

    return 444;
}
