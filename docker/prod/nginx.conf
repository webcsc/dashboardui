# =============================================================================
# CSC Dashboard — Nginx Configuration (Production)
# =============================================================================
# Optimized for React SPA with react-router:
#   - try_files fallback to index.html (client-side routing)
#   - Long cache for hashed assets (Vite fingerprints)
#   - No cache for index.html (always fresh)
#   - Gzip compression
#   - Security headers
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Hashed Assets (Vite fingerprinted) ──────────────────────────────
    # Files in /assets/ have content hashes in filenames → cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ─── Static Files (favicon, manifest, etc.) ─────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ─── SPA Fallback ────────────────────────────────────────────────────
    # All unmatched routes are served by index.html (react-router handles them)
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached (ensures fresh deploys)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
